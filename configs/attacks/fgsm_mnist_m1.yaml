attack:
  name: fgsm
  norm:
  targeted: false
  epsilon: 0.2
  epsilon_scale: zero_one
  kappa:
  max_iterations:
  learning_rate:
  binary_search_steps:
  initial_const:
  abort_early:
  clip_min: 0.0
  clip_max: 1.0
  input_scale: zero_one
  use_true_label: true
  table10_epsilons: [0.1, 0.2, 0.3, 0.4]

model:
  name: m1
  backend: tensorflow
  input_scale: zero_one
  preprocessing: none
  checkpoint_dir: artifacts/models/mnist/m1/clean_baseline/checkpoints

dataset:
  name: mnist
  split: test
  start_index: 5500
  n_samples: 4500
  selection_strategy: sequential
  classes: all

success_criteria:
  skip_wrong_clean_prediction: true
  success_rule: adv_pred != clean_pred
