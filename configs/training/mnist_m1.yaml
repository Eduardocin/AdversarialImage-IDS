training:
  name: mnist_m1_clean_baseline
  seed_tf: 1234
  seed_numpy: [2017, 8, 30]
  epochs: 6
  batch_size: 128
  learning_rate: 0.001
  label_smoothing: 0.1
  load_model: false

model:
  name: m1
  backend: tensorflow
  architecture: cleverhans.utils_keras.cnn_model
  input_shape: [28, 28, 1]
  input_scale: zero_one
  checkpoint_dir: artifacts/models/mnist/m1/clean_baseline/checkpoints
  checkpoint_filename: mnist.ckpt

dataset:
  name: mnist
  train_split: train
  test_split: test
  train_start: 0
  train_end: 60000
  test_start: 0
  test_end: 10000
  image_shape: [28, 28, 1]
  value_range: [0.0, 1.0]
  label_format: one_hot

outputs:
  summary_dir: results/mnist/clean_baseline
  checkpoint_dir: artifacts/models/mnist/m1/clean_baseline/checkpoints
