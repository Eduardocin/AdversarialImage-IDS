experiment:
  name: mnist_table_4_scalar_quantization_intervals
  type: faithful_reproduction
  seed: null
  deterministic_slice: true
  objective: Evaluate scalar quantization with different numbers of intervals.

dataset:
  name: mnist
  split: test
  start: 0
  end: 4500
  image_shape: [28, 28, 1]
  value_range: [0.0, 1.0]

model:
  family: keras
  reference: DeepDetector MNIST classifier
  checkpoint_dir: artifacts/models/mnist/m1/clean_baseline/checkpoints

attack:
  name: fgsm
  library: cleverhans
  epsilon: 0.2
  clip_min: 0.0
  clip_max: 1.0

quantization:
  method: scalar_quantization
  intervals: [2, 3, 4, 5, 6, 7, 8, 9, 10]
  interval_sizes:
    2: 128
    3: 85
    4: 64
    5: 51
    6: 43
    7: 37
    8: 32
    9: 28
    10: 26
  left: true

evaluation:
  exclude_invalid_pairs: false

metrics:
  columns:
    - Intervals
    - Interval size
    - Recall
    - Precision
    - F1
  raw_fields:
    - intervals
    - interval_size
    - recall_percent
    - precision_percent
    - f1_percent

output:
  results_dir: results/mnist/article_reproduction
  csv: table_4_scalar_quantization_intervals.csv
  markdown: table_4_scalar_quantization_intervals.md
