      caffemodel: artifacts/models/imagenet/googlenet/bvlc_googlenet.caffemodel
      mean_file: null
      use_gpu: true
      batch_size: 32
    attack: {}
    evaluation:
      n_samples: all
      seed: 20170830
    filter:
      name: proposed_detection_filter
      type: proposed_detection_filter
    model_group: googlenet
    dataset_label: ImageNet
    rows:
      - "no": 5
        attack_model: "FGSM (ε=1/255)/GoogLeNet"
        status: implemented
        attack:
          name: fgsm
          epsilon: 0.00392156862745098
          clip_min: 0.0
          clip_max: 255.0
      - "no": 6
        attack_model: "FGSM (ε=2/255)/GoogLeNet"
        status: implemented
