defaults:
  output:
    csv: metrics.csv
    json: metrics.json

experiments:
  table_3:
    kind: filter_grid
    output_dir: results/experiments/table_3
    dataset:
      name: mnist
      split: test
      start: 0
      end: 100
    model:
      name: mnist_m1
      checkpoint_dir: artifacts/models/mnist/m1/clean_baseline/checkpoints
    attack:
      name: fgsm
      epsilon: 0.2
      clip_min: 0.0
      clip_max: 1.0
    evaluation:
      batch_size: 256
      exclude_invalid_pairs: true
      include_filter_time: true
    output:
      include_filter_name: false
    filters:
      - name: scalar_quantization_2
        type: scalar_quantization
        intervals: 2
      - name: nonuniform_quantization
        type: nonuniform_quantization

  table_4:
    kind: composite
    output_dir: results/experiments/table_4
    components:
      - table_4_mnist
      - table_4_imagenet

  table_4_mnist:
    kind: filter_grid
    output_dir: results/experiments/table_4/mnist
    dataset:
      name: mnist
      split: test
      start: 0
      end: 4500
    model:
      name: mnist_m1
      checkpoint_dir: artifacts/models/mnist/m1/clean_baseline/checkpoints
    attack:
      name: fgsm
      epsilon: 0.2
      clip_min: 0.0
      clip_max: 1.0
    evaluation:
      batch_size: 256
      exclude_invalid_pairs: false
    filters:
      - name: scalar_quantization_2
        type: scalar_quantization
        intervals: 2
      - name: scalar_quantization_3
        type: scalar_quantization
        intervals: 3
      - name: scalar_quantization_4
        type: scalar_quantization
        intervals: 4
      - name: scalar_quantization_5
        type: scalar_quantization
        intervals: 5
      - name: scalar_quantization_6
        type: scalar_quantization
        intervals: 6
      - name: scalar_quantization_7
        type: scalar_quantization
        intervals: 7
      - name: scalar_quantization_8
        type: scalar_quantization
        intervals: 8
      - name: scalar_quantization_9
        type: scalar_quantization
        intervals: 9
      - name: scalar_quantization_10
        type: scalar_quantization
        intervals: 10

  table_4_imagenet:
    kind: imagenet_table_4
    output_dir: results/experiments/table_4/imagenet
    dataset:
      name: imagenet
      split: train
      images_dir: data/imagenet/train
      n_samples: null
      image_size: 224
      image_shape: [224, 224, 3]
      value_range: [0.0, 1.0]
      shuffle: false
      class_indices:
        goldfish: 1
        pineapple: 953
        digital_clock: 530
    model:
      name: googlenet_caffe
      family: caffe
      reference: BVLC GoogLeNet
      model_dir: artifacts/models/imagenet/googlenet/
      deploy_proto: artifacts/models/imagenet/googlenet/deploy.prototxt
      caffemodel: artifacts/models/imagenet/googlenet/bvlc_googlenet.caffemodel
      mean_file: null
      use_gpu: true
      batch_size: 32
    attack:
      name: fgsm
      epsilon_255: 1.0
      clip_min: 0.0
      clip_max: 1.0
      batch_size: 32
    evaluation:
      exclude_invalid_pairs: false
    quantization:
      method: scalar_quantization
      intervals: [2, 3, 4, 5, 6, 7, 8, 9, 10]
      interval_sizes:
        2: 128
        3: 85
        4: 64
        5: 51
        6: 43
        7: 37
        8: 32
        9: 28
        10: 26
      left: true
    output:
      csv: table_4_imagenet.csv
      status_json: table_4_status.json

  table_6:
    kind: table_6
    description: Adaptive quantization strategy
    output_dir: results/experiments/table_6
    datasets: [mnist, imagenet]
    split_order: [train, validation]
    entropy_thresholds:
      low: 4.0
      medium: 5.0
    quantization:
      low_entropy_intervals: 2
      medium_entropy_intervals: 4
      high_entropy_intervals: 6
      interval_sizes:
        low_entropy: 128
        medium_entropy: 64
        high_entropy: 43
    mnist:
      dataset:
        name: mnist
        split: test
        slices:
          - name: Training
            start: 0
            end: 4500
          - name: Validation
            start: 4500
            end: 5500
      model:
        name: mnist_m1
        checkpoint_dir: artifacts/models/mnist/m1/clean_baseline/checkpoints
      attack:
        name: fgsm
        epsilon: 0.2
        clip_min: 0.0
        clip_max: 1.0
      evaluation:
        batch_size: 256
        exclude_invalid_pairs: false
      filter:
        name: adaptive_quantization
        type: adaptive_quantization
    imagenet:
      dataset:
        name: imagenet
        image_size: 224
        image_shape: [224, 224, 3]
        value_range: [0.0, 1.0]
        shuffle: false
        n_samples: null
        splits:
          train:
            - name: goldfish
              label: 1
              path: data/imagenet/train/goldfish
            - name: pineapple
              label: 953
              path: data/imagenet/train/pineapple
            - name: digital_clock
              label: 530
              path: data/imagenet/train/digital_clock
          validation:
            - name: jellyfish
              label: 107
              path: data/imagenet/validation/jellyfish
      model:
        name: googlenet_caffe
        family: caffe
        reference: BVLC GoogLeNet
        model_dir: artifacts/models/imagenet/googlenet/
        deploy_proto: artifacts/models/imagenet/googlenet/deploy.prototxt
        caffemodel: artifacts/models/imagenet/googlenet/bvlc_googlenet.caffemodel
        mean_file: null
        use_gpu: true
        batch_size: 32
      attack:
        name: fgsm
        epsilon_255: 1.0
        clip_min: 0.0
        clip_max: 255.0
        batch_size: 32
      evaluation:
        exclude_invalid_pairs: false

  table_7:
    kind: imagenet_table_7
    output_dir: results/experiments/table_7
    dataset:
      name: imagenet
      split: training
      image_size: 224
      shuffle: false
      classes:
        - name: goldfish
          label: 1
          path: data/imagenet/train/goldfish
        - name: pineapple
          label: 953
          path: data/imagenet/train/pineapple
        - name: digital_clock
          label: 530
          path: data/imagenet/train/digital_clock
    model:
      name: googlenet_caffe
      family: caffe
      reference: BVLC GoogLeNet
      model_dir: artifacts/models/imagenet/googlenet/
      deploy_proto: artifacts/models/imagenet/googlenet/deploy.prototxt
      caffemodel: artifacts/models/imagenet/googlenet/bvlc_googlenet.caffemodel
      mean_file: null
      use_gpu: true
      batch_size: 32
    attack:
      name: fgsm
      epsilon_255: 1.0
      clip_min: 0.0
      clip_max: 255.0
      batch_size: 32
      adversarial_path: artifacts/adversarial_examples/imagenet/fgsm/train/adversarial_examples.npy
      save_adversarial_path: artifacts/adversarial_examples/imagenet/fgsm/train/adversarial_examples.npy
    filter:
      entropy_threshold: 5.0
      mask_types: [cross, diamond, box]
      sizes: [3, 5, 7, 9]
    output:
      pivot_csv: table_7_imagnet.csv
      status_json: table_7_status.json

  table_8:
    kind: imagenet_table_8
    output_dir: results/experiments/table_8
    dataset:
      name: imagenet
      split: validation
      image_size: 224
      shuffle: false
      classes:
        - name: jellyfish
          label: 107
          path: data/imagenet/validation/jellyfish
    model:
      name: googlenet_caffe
      family: caffe
      reference: BVLC GoogLeNet
      model_dir: artifacts/models/imagenet/googlenet/
      deploy_proto: artifacts/models/imagenet/googlenet/deploy.prototxt
      caffemodel: artifacts/models/imagenet/googlenet/bvlc_googlenet.caffemodel
      mean_file: null
      use_gpu: true
      batch_size: 32
    attack:
      name: fgsm
      epsilon_255: 1.0
      clip_min: 0.0
      clip_max: 255.0
      batch_size: 32
      adversarial_path: artifacts/adversarial_examples/imagenet/fgsm/validation/adversarial_examples.npy
      save_adversarial_path: artifacts/adversarial_examples/imagenet/fgsm/validation/adversarial_examples.npy
    filter:
      filters:
        - mask_type: cross
          size: 5
        - mask_type: cross
          size: 7
        - mask_type: diamond
          size: 5
        - mask_type: diamond
          size: 7
        - mask_type: box
          size: 5
    output:
      pivot_csv: table_8_imagenet.csv
      status_json: table_8_status.json

  table_9:
    kind: table_9
    output_dir: results/experiments/table_9
    description: Final proposed detection filter against FGSM
    datasets: [mnist, imagenet]
    split_order: [train, validation]
    mnist:
      dataset:
        name: mnist
        split: test
        slices:
          - name: Training
            start: 0
            end: 4500
          - name: Validation
            start: 4500
            end: 5500
      model:
        name: mnist_m1
        checkpoint_dir: artifacts/models/mnist/m1/clean_baseline/checkpoints
      attack:
        name: fgsm
        epsilon: 0.2
        clip_min: 0.0
        clip_max: 1.0
      evaluation:
        batch_size: 256
        exclude_invalid_pairs: false
      filter:
        name: proposed_detection_filter
        type: proposed_detection_filter
    imagenet:
      dataset:
        name: imagenet
        image_size: 224
        image_shape: [224, 224, 3]
        value_range: [0.0, 1.0]
        shuffle: false
        n_samples: null
        splits:
          train:
            - name: goldfish
              label: 1
              path: data/imagenet/train/goldfish
            - name: pineapple
              label: 953
              path: data/imagenet/train/pineapple
            - name: digital_clock
              label: 530
              path: data/imagenet/train/digital_clock
          validation:
            - name: jellyfish
              label: 107
              path: data/imagenet/validation/jellyfish
      model:
        name: googlenet_caffe
        family: caffe
        reference: BVLC GoogLeNet
        model_dir: artifacts/models/imagenet/googlenet/
        deploy_proto: artifacts/models/imagenet/googlenet/deploy.prototxt
        caffemodel: artifacts/models/imagenet/googlenet/bvlc_googlenet.caffemodel
        mean_file: null
        use_gpu: true
        batch_size: 32
      attack:
        name: fgsm
        epsilon_255: 1.0
        clip_min: 0.0
        clip_max: 255.0
        batch_size: 32
      evaluation:
        exclude_invalid_pairs: false
      filter:
        name: proposed_detection_filter
        type: proposed_detection_filter

  table_10_m1:
    kind: table_10_group
    output_dir: results/experiments/table_10/m1
    dataset:
      name: mnist
    model:
      name: m1
    attack: {}
    evaluation: {}
    model_group: m1
    dataset_label: MNIST
    rows:
      - "no": 1
        attack_model: "FGSM (ε=0.1)/M1"
        status: implemented
        attack:
          name: fgsm
          epsilon: 0.1
      - "no": 2
        attack_model: "FGSM (ε=0.2)/M1"
        status: implemented
        attack:
          name: fgsm
          epsilon: 0.2
      - "no": 3
        attack_model: "FGSM (ε=0.3)/M1"
        status: implemented
        attack:
          name: fgsm
