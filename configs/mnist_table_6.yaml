experiment:
  name: mnist_table_6_adaptive_quantization
  type: faithful_reproduction
  seed: null
  deterministic_slice: true
  display_name: Validação da quantização adaptativa
  dataset_used: training_and_validation_slices
  attack_method: fgsm
  evaluated_method: entropy_defined_adaptive_quantization
  objective: Validate adaptive quantization on training and validation slices using FGSM.

dataset:
  name: mnist
  split: test
  slices:
    - name: Training
      start: 0
      end: 4500
    - name: Validation
      start: 4500
      end: 5500
  image_shape: [28, 28, 1]
  value_range: [0.0, 1.0]

model:
  family: keras
  reference: DeepDetector MNIST classifier
  checkpoint_dir: artifacts/models/mnist/m1/clean_baseline/checkpoints

attack:
  name: fgsm
  library: cleverhans
  epsilon: 0.2
  clip_min: 0.0
  clip_max: 1.0

quantization:
  method: entropy_defined_adaptive_quantization
  entropy_thresholds:
    low: 4.0
    medium: 5.0
  intervals:
    low_entropy: 2
    medium_entropy: 4
    high_entropy: 6
  left: true

evaluation:
  exclude_invalid_pairs: false

metrics:
  columns:
    - Split
    - TP
    - FN
    - FP
    - Recall
    - Precision
    - F1
  raw_fields:
    - split
    - TP
    - FN
    - FP
    - recall_percent
    - precision_percent
    - f1_percent

output:
  results_dir: results/mnist/article_reproduction
  csv: table_6_adaptive_quantization.csv
  markdown: table_6_adaptive_quantization.md
