experiment:
  name: mnist_table_3_uniform_vs_nonuniform
  type: faithful_reproduction
  seed: null
  deterministic_slice: true
  objective: Compare uniform and non-uniform quantization on fixed MNIST test samples.

dataset:
  name: mnist
  split: test
  start: 0
  end: 100
  image_shape: [28, 28, 1]
  value_range: [0.0, 1.0]

model:
  family: keras
  reference: DeepDetector MNIST classifier
  checkpoint_dir: artifacts/models/mnist/m1/clean_baseline/checkpoints

attack:
  name: fgsm
  library: cleverhans
  epsilon: 0.2
  clip_min: 0.0
  clip_max: 1.0

detection:
  filters:
    - name: Uniform
      method: scalar_quantization
      intervals: 2
      interval_size: 128
      left: true
    - name: Non-uniform
      method: nonuniform_quantization_legacy
      histogram_bins: 256
      border: original_matplotlib_histogram_bin_index

evaluation:
  exclude_invalid_pairs: true
  clean_error_policy: skip_before_counting_detection_metrics
  attack_failure_policy: skip_when_adversarial_prediction_matches_clean_prediction
  false_positive_scope: valid_clean_successful_attack_pairs

metrics:
  columns:
    - Quantização
    - Time(s)
    - Recall
    - Precision
    - F1
  raw_fields:
    - quantization
    - time_seconds
    - recall_percent
    - precision_percent
    - f1_percent

output:
  results_dir: results/mnist/article_reproduction
  csv: table_3_uniform_vs_nonuniform.csv
  markdown: table_3_uniform_vs_nonuniform.md
